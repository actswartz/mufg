all:
  vars:
    # The generated inventory is assumed to be used from the clab host.
    # Hence no http proxy should be used. Therefore we make sure the http
    # module does not attempt using any global http proxy.
    ansible_httpapi_use_proxy: false
  children:
    cisco_xrd:
      vars:
        # ansible_connection: set ansible_connection variable if required
        ansible_user: clab
        ansible_password: clab@123
      hosts:
        clab-xrd-lab-p1-xr1:
          ansible_host: 172.30.30.11
        clab-xrd-lab-p1-xr2:
          ansible_host: 172.30.30.12
        clab-xrd-lab-p2-xr1:
          ansible_host: 172.30.30.21
        clab-xrd-lab-p2-xr2:
          ansible_host: 172.30.30.22
        clab-xrd-lab-p3-xr1:
          ansible_host: 172.30.30.31
        clab-xrd-lab-p3-xr2:
          ansible_host: 172.30.30.32
        clab-xrd-lab-p4-xr1:
          ansible_host: 172.30.30.41
        clab-xrd-lab-p4-xr2:
          ansible_host: 172.30.30.42
        clab-xrd-lab-p5-xr1:
          ansible_host: 172.30.30.51
        clab-xrd-lab-p5-xr2:
          ansible_host: 172.30.30.52