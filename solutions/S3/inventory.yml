all:
  vars:
    ansible_user: admin
    my_variable: "Student-Pod-3"
    ansible_password: 800-ePlus
    ansible_ssh_pass: 800-ePlus
    ansible_become_pass: 800-ePlus
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
    ansible_become: true
    ansible_become_method: enable
    ansible_ssh_extra_args: '-o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no'
    ansible_network_cli_ssh_type: libssh

  children:
    routers:
      hosts:
        S3-R1:
          ansible_host: 172.20.20.8
          l3_interfaces:
            - { name: Ethernet0/0, ipv4: [{ address: 172.20.20.8/24 }] }
            - { name: Ethernet0/1, ipv4: [{ address: 12.12.12.1/24 }] }
            - { name: Ethernet0/3, ipv4: [{ address: 13.13.13.1/24 }] }
          ospf:
            router_id: 3.1.1.1
            networks:
              - { network: 12.12.12.0, wildcard: 0.0.0.255, area: 0 }
              - { network: 13.13.13.0, wildcard: 0.0.0.255, area: 0 }

        S3-R2:
          ansible_host: 172.20.20.9
          l3_interfaces:
            - { name: Ethernet0/0, ipv4: [{ address: 172.20.20.9/24 }] }
            - { name: Ethernet0/1, ipv4: [{ address: 12.12.12.2/24 }] }
            - { name: Ethernet0/2, ipv4: [{ address: 23.23.23.2/24 }] }
          ospf:
            router_id: 3.2.2.2
            networks:
              - { network: 12.12.12.0, wildcard: 0.0.0.255, area: 0 }
              - { network: 23.23.23.0, wildcard: 0.0.0.255, area: 0 }

        S3-R3:
          ansible_host: 172.20.20.10
          l3_interfaces:
            - { name: Ethernet0/0, ipv4: [{ address: 172.20.20.10/24 }] }
            - { name: Ethernet0/2, ipv4: [{ address: 23.23.23.3/24 }] }
            - { name: Ethernet0/3, ipv4: [{ address: 13.13.13.3/24 }] }
          ospf:
            router_id: 3.3.3.3
            networks:
              - { network: 23.23.23.0, wildcard: 0.0.0.255, area: 0 }
              - { network: 13.13.13.0, wildcard: 0.0.0.255, area: 0 }
