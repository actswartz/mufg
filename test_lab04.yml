---
- name: Test Lab 4 - Interface IPs
  hosts: student1
  gather_facts: false
  tasks:
    - name: Configure Ethernet0/1 IP
      cisco.ios.ios_l3_interfaces:
        config:
          - name: Ethernet0/1
            ipv4:
              - address: "{{ '12.12.12.1/24' if inventory_hostname == 'S1-R1' else '12.12.12.2/24' if inventory_hostname == 'S1-R2' else '12.12.12.3/24' }}"
        state: merged
